<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thursday Football Booking</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="hero-top">
        <div class="eyebrow">Thursday Night Football</div>
        <div class="trust-row">
          <span class="trust-pill">Apple Pay</span>
          <span class="trust-pill">Card</span>
          <span class="trust-pill">Secure checkout</span>
        </div>
      </div>

      <h1 id="title">Loading...</h1>

      <p id="meta" class="meta"></p>
      <p id="availability" class="availability"></p>

      <div class="section-label">Book your place</div>

      <form id="booking-form">
        <div class="field-grid">
          <label class="field-span-2">
            Your name
            <input type="text" id="name" required />
          </label>

          <label class="field-span-2">
            Email
            <input type="email" id="email" required />
          </label>

          <label>
            Phone
            <input type="text" id="phone" />
          </label>

          <label>
            Number of players
            <select id="player-count" required>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </label>
        </div>

        <div id="guest-fields" class="guest-fields"></div>

        <p id="total-price" class="total-price"></p>

        <button id="submit-btn" type="submit">Book & Pay</button>

        <p class="policy-note">
          Payment secures your place. If you cannot make it, message early and we will try to fill your spot.
        </p>
      </form>

      <div class="footer-note">
        <span>Secure payment via Stripe</span>
        <span>No cash chasing</span>
      </div>

      <p id="message" class="message"></p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
