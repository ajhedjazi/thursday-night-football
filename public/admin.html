<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - bookings</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="wrap">
    <section class="card admin"></section>
      <h1>Bookings admin</h1>

      <div class="admin-actions">
  <label>
    Admin password
    <input type="password" id="admin-password" />
  </label>

  <button id="load-btn" type="button">Load bookings</button>
</div>

<p id="summary" class="summary"></p>
<div id="results"></div>
    </section>
  </main>

  <script>
    const loadBtn = document.getElementById("load-btn");
    const results = document.getElementById("results");
    const summary = document.getElementById("summary");

    loadBtn.addEventListener("click", async () => {
      results.innerHTML = "";
      summary.textContent = "";

      const password = document.getElementById("admin-password").value;

      const res = await fetch("/api/admin/bookings", {
        headers: {
          "x-admin-password": password
        }
      });

      const data = await res.json();

      if (!res.ok) {
        summary.textContent = data.error || "Failed to load.";
        return;
      }

      summary.textContent = `${data.session.booked}/${data.session.capacity} booked. ${data.session.remaining} spaces left.`;

      if (!data.bookings.length) {
        results.innerHTML = "<p>No bookings yet.</p>";
        return;
      }

const rows = data.bookings.map((b) => {
  let guests = [];
  try {
    guests = JSON.parse(b.guest_names || "[]");
  } catch (e) {
    guests = [];
  }

  return `
    <tr>
      <td>${b.customer_name}</td>
      <td>${b.customer_email}</td>
      <td>${b.customer_phone || ""}</td>
      <td>${b.player_count}</td>
      <td class="guest-cell">${guests.join(", ")}</td>
      <td>${b.created_at}</td>
    </tr>
  `;
}).join("");

    results.innerHTML = `
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Booked by</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Players</th>
          <th>Guest names</th>
          <th>Booked at</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
`;
    });
  </script>
</body>
</html>
