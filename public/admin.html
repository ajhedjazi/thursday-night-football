<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - bookings</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="wrap">
    <section class="card admin">
      <div class="admin-header">
        <div>
          <h1>Bookings admin</h1>
          <p class="admin-subtitle">Manage bookings, session status, credits and refunds.</p>
        </div>
        <div class="admin-badge">Admin tools</div>
      </div>

      <div class="admin-panel">
        <div class="admin-actions admin-actions-top">
          <label>
            Admin password
            <input type="password" id="admin-password" autocomplete="current-password" />
          </label>

          <button id="load-btn" type="button">Load bookings</button>
        </div>

        <div class="admin-actions admin-actions-secondary">
          <button id="close-session-btn" type="button">Close session</button>
          <button id="cancel-session-btn" type="button" class="button-danger">Cancel session</button>
        </div>
      </div>

      <div class="admin-panel">
        <div class="section-label">Manual add</div>
        <div class="admin-actions admin-actions-manual">
          <label>
            Manual player name
            <input type="text" id="manual-name" />
          </label>
          <label>
            Manual player email
            <input type="email" id="manual-email" />
          </label>
          <label>
            Manual player phone
            <input type="text" id="manual-phone" />
          </label>
          <button id="add-manual-btn" type="button">Add manual player</button>
        </div>
      </div>

      <p id="flash" class="message message-admin" aria-live="polite"></p>
      <p id="summary" class="summary"></p>
      <div id="results"></div>
    </section>
  </main>

  <script>
    const loadBtn = document.getElementById("load-btn");
    const closeSessionBtn = document.getElementById("close-session-btn");
    const cancelSessionBtn = document.getElementById("cancel-session-btn");
    const addManualBtn = document.getElementById("add-manual-btn");
    const results = document.getElementById("results");
    const summary = document.getElementById("summary");
    const flash = document.getElementById("flash");
    const passwordInput = document.getElementById("admin-password");
    const manualNameInput = document.getElementById("manual-name");
    const manualEmailInput = document.getElementById("manual-email");
    const manualPhoneInput = document.getElementById("manual-phone");
    const actionButtons = [loadBtn, closeSessionBtn, cancelSessionBtn, addManualBtn];

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => (
        {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char]
      ));
    }

    function getPassword() {
      return passwordInput.value.trim();
    }

    function setFlash(message, tone = "") {
      flash.textContent = message || "";
      flash.className = `message message-admin${tone ? ` ${tone}` : ""}`;
    }

    function setBusy(isBusy) {
      actionButtons.forEach((button) => {
        button.disabled = isBusy;
      });
    }

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, options);
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        throw new Error(data.error || "Request failed.");
      }

      return data;
    }

    function renderEmptyState(message) {
      results.innerHTML = `<div class="admin-empty">${escapeHtml(message)}</div>`;
    }

    function renderBookings(data) {
      const rows = data.bookings.map((booking) => {
        let guests = [];
        try {
          guests = JSON.parse(booking.guest_names || "[]");
        } catch (error) {
          guests = [];
        }

        const statusBits = [];
        if (booking.is_manual) statusBits.push("Manual");
        if (booking.is_credited) statusBits.push("Credited");
        if (booking.payment_status === "refunded") statusBits.push("Refunded");

        const statusText = statusBits.join(", ") || "Paid";

        return `
          <tr>
            <td>${escapeHtml(booking.customer_name)}</td>
            <td>${escapeHtml(booking.customer_email)}</td>
            <td>${escapeHtml(booking.customer_phone)}</td>
            <td>${escapeHtml(booking.player_count)}</td>
            <td class="guest-cell">${escapeHtml(guests.join(", ")) || "-"}</td>
            <td><span class="status-pill">${escapeHtml(statusText)}</span></td>
            <td>${escapeHtml(booking.created_at)}</td>
            <td>
              <div class="row-actions">
                <button type="button" onclick="giveCredit(${booking.id})">Give credit</button>
                <button type="button" onclick="refundBooking(${booking.id})" class="button-danger">Refund</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");

      results.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Booked by</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Players</th>
                <th>Guest names</th>
                <th>Status</th>
                <th>Booked at</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    async function runAdminAction(action, successMessage, shouldReload = true) {
      if (!getPassword()) {
        setFlash("Enter the admin password first.", "error");
        passwordInput.focus();
        return;
      }

      setBusy(true);
      setFlash("");

      try {
        await action();
        setFlash(successMessage, "success");
        if (shouldReload) {
          await loadBookings();
        }
      } catch (error) {
        setFlash(error.message || "Something went wrong.", "error");
      } finally {
        setBusy(false);
      }
    }

    async function loadBookings() {
      if (!getPassword()) {
        setFlash("Enter the admin password to load bookings.", "error");
        passwordInput.focus();
        return;
      }

      setBusy(true);
      setFlash("");
      summary.textContent = "";
      results.innerHTML = '<div class="admin-empty">Loading bookings...</div>';

      try {
        const data = await fetchJson("/api/admin/bookings", {
          headers: {
            "x-admin-password": getPassword()
          }
        });

        if (!data.session) {
          summary.textContent = "No open session available.";
          renderEmptyState("There are no open sessions to manage right now.");
          return;
        }

        summary.textContent = `${data.session.title} | ${data.session.date} | ${data.session.time} | ${data.session.booked}/${data.session.capacity} booked | ${data.session.remaining} spaces left.`;

        if (!data.bookings.length) {
          renderEmptyState("No bookings yet for the current session.");
          return;
        }

        renderBookings(data);
      } catch (error) {
        summary.textContent = "";
        renderEmptyState("Could not load bookings.");
        setFlash(error.message || "Failed to load bookings.", "error");
      } finally {
        setBusy(false);
      }
    }

    loadBtn.addEventListener("click", loadBookings);

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        loadBookings();
      }
    });

    closeSessionBtn.addEventListener("click", async () => {
      if (!confirm("Close the current session?")) return;

      await runAdminAction(
        () => fetchJson("/api/admin/session/close", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-password": getPassword()
          }
        }),
        "Session closed."
      );
    });

    cancelSessionBtn.addEventListener("click", async () => {
      if (!confirm("Cancel the current session?")) return;

      await runAdminAction(
        () => fetchJson("/api/admin/session/cancel", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-password": getPassword()
          }
        }),
        "Session cancelled."
      );
    });

    addManualBtn.addEventListener("click", async () => {
      const name = manualNameInput.value.trim();
      const email = manualEmailInput.value.trim();
      const phone = manualPhoneInput.value.trim();

      if (!name) {
        setFlash("Enter a player name for the manual booking.", "error");
        manualNameInput.focus();
        return;
      }

      await runAdminAction(
        async () => {
          await fetchJson("/api/admin/manual-booking", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-admin-password": getPassword()
            },
            body: JSON.stringify({ name, email, phone })
          });

          manualNameInput.value = "";
          manualEmailInput.value = "";
          manualPhoneInput.value = "";
        },
        "Manual player added."
      );
    });

    async function giveCredit(bookingId) {
      if (!confirm("Give this booking credit for the next open session?")) return;

      await runAdminAction(
        () => fetchJson("/api/admin/booking/credit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-password": getPassword()
          },
          body: JSON.stringify({ bookingId })
        }),
        "Credit applied to next session."
      );
    }

    async function refundBooking(bookingId) {
      if (!confirm("Refund this booking?")) return;

      await runAdminAction(
        () => fetchJson("/api/admin/booking/refund", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-password": getPassword()
          },
          body: JSON.stringify({ bookingId })
        }),
        "Booking marked as refunded."
      );
    }

    window.giveCredit = giveCredit;
    window.refundBooking = refundBooking;
  </script>
</body>
</html>
